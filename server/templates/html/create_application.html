<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50 text-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Application - Ghostenv 👻</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full antialiased font-sans">
    <main class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md mx-auto">
            
            <!-- Back Navigation Link -->
            <div class="mb-6">
                <a href="/dashboard" class="inline-flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-900 transition-colors">
                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to Home
                </a>
            </div>

            <!-- Form Card Wrapper -->
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 sm:p-8">
                <!-- Form Header -->
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Create Application</h2>
                    <p class="mt-1 text-sm text-gray-500">Initialize a brand new application stack to configure environment variables.</p>
                </div>

                <!-- Form Submission Stack -->
                <form method="post" class="space-y-5">
                    <!-- App Name Field -->
                    <div>
                        <label for="app_name" class="block text-xs font-medium text-gray-700 uppercase tracking-wider mb-1.5">
                            Application Name
                        </label>
                        <input type="text" id="app_name" name="app_name" placeholder="e.g. payment-gateway-api" required
                               class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono" />
                    </div>
                    
                    <!-- Description Field -->
                    <div>
                        <label for="description" class="block text-xs font-medium text-gray-700 uppercase tracking-wider mb-1.5">
                            Description
                        </label>
                        <textarea id="description" name="description" rows="4" placeholder="Briefly explain what variables this environment handles..."
                                  class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"></textarea>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="pt-2">
                        <button type="submit" 
                                class="w-full inline-flex items-center justify-center px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-md shadow-sm transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Create Application
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </main>
</body>
</html>
