<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50 text-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ghostenv 👻</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full antialiased font-sans">
    <div class="min-h-screen flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">
        
        <div class="sm:mx-auto w-full max-w-md">
            <!-- App Identity Header -->
            <div class="text-center mb-8">
                <span class="inline-flex items-center justify-center w-12 h-12 bg-indigo-50 text-2xl rounded-xl shadow-sm mb-2">
                    👻
                </span>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">
                    Create your account
                </h1>
                <p class="mt-2 text-sm text-gray-500">
                    Already have an account? 
                    <a href="/auth/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">
                        Sign in instead
                    </a>
                </p>
            </div>

            <!-- Main Register Card Container -->
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 sm:p-8">
                <form method="post" class="space-y-5">
                    
                    <!-- Username Field -->
                    <div>
                        <label for="username" class="block text-xs font-medium text-gray-700 uppercase tracking-wider mb-1.5">
                            Username
                        </label>
                        <input id="username" name="username" type="text" placeholder="choose_username" required autocomplete="username"
                               class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono" />
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-xs font-medium text-gray-700 uppercase tracking-wider mb-1.5">
                            Password
                        </label>
                        <input id="password" name="password" type="password" placeholder="••••••••" required autocomplete="new-password"
                               class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
                    </div>

                    <!-- Submit Registration Button -->
                    <div class="pt-2">
                        <button type="submit" 
                                class="w-full inline-flex items-center justify-center px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-md shadow-sm transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Get Started
                        </button>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</body>
</html>
